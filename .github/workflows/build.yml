name: Build APK HadirBos
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install dependencies
        run: npm install
        
      - name: Init Capacitor
        run: npx cap init HadirBos com.hadirbos.app --web-dir=.
        
      - name: Add Android
        run: npx cap add android
        
      - name: Tambah Permission GPS
        run: |
          sed -i '/<\/manifest>/i\    <uses-permission android:name="android.permission.INTERNET" \/>\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" \/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" \/>\n    <uses-permission android:name="android.permission.CAMERA" \/>' android/app/src/main/AndroidManifest.xml
          
      - name: Build APK
        run: |
          npx cap sync
          cd android && ./gradlew assembleDebug
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: HadirBos-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
        
          